<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App Store</title>
    <style>
        /* বেসিক স্টাইলিং */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f6f8; }
        .mobile-container { max-width: 400px; margin: 20px auto; background: white; height: 90vh; border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 5px solid #333; position: relative; }
        header { background: #007bff; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; }
        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 70px; }
        
        /* ট্যাব হাইড/শো করার জন্য */
        .tab { display: none; }
        .tab.active { display: block; }
        
        /* অ্যাপ কার্ড ডিজাইন */
        .app-card { display: flex; align-items: center; background: #fff; padding: 12px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border: 1px solid #eaeaea; }
        .app-logo { width: 65px; height: 65px; border-radius: 12px; object-fit: cover; margin-right: 15px; background: #e9ecef; border: 1px solid #ddd; }
        .app-info { flex: 1; }
        .app-title { font-size: 16px; font-weight: bold; margin: 0 0 5px; color: #333; }
        .app-stats { font-size: 12px; color: #666; margin-bottom: 6px; }
        .app-links a { font-size: 12px; color: #007bff; text-decoration: none; font-weight: 600; }
        .btn-download { background: #f0f0f0; color: #007bff; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        
        /* প্রোফাইল এবং আপলোড ফর্ম */
        .upload-form { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .upload-form input, .upload-form button { padding: 12px; font-size: 15px; border: 1px solid #ccc; border-radius: 8px; }
        .upload-form button { background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
        
        /* সার্চ বক্স */
        .search-box { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }

        /* নিচের নেভিগেশন বার */
        nav { display: flex; justify-content: space-around; background: #fff; border-top: 1px solid #ddd; padding: 12px 0; position: absolute; bottom: 0; width: 100%; }
        nav button { background: none; border: none; font-size: 15px; cursor: pointer; color: #888; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        nav button.active { color: #007bff; }
    </style>
</head>
<body>

<div class="mobile-container">
    <header>App Store</header>
    
    <main>
        <div id="home" class="tab active">
            <h3 style="margin-top:0;">Recommended</h3>
            <div id="appList">
                <div class="app-card">
                    <img src="https://via.placeholder.com/65?text=Logo" class="app-logo" alt="Demo App">
                    <div class="app-info">
                        <h3 class="app-title">Demo App</h3>
                        <div class="app-stats">⭐ 4.8 | 📥 50K+ Downloads</div>
                        <div class="app-links"><a href="#" target="_blank">LinkedIn Profile</a></div>
                    </div>
                    <button class="btn-download" onclick="alert('Downloading...')">GET</button>
                </div>
            </div>
        </div>

        <div id="search" class="tab">
            <h3 style="margin-top:0;">Search Apps</h3>
            <input type="text" class="search-box" placeholder="Search for apps & games...">
        </div>

        <div id="profile" class="tab">
            <h3 style="margin-top:0;">Developer Profile</h3>
            <p style="color: #666; font-size: 14px;">Upload your new app to the store.</p>
            
            <div class="upload-form">
                <input type="text" id="appName" placeholder="Enter App Name" required>
                <label style="font-size: 14px; color: #555;">Upload App Logo:</label>
                <input type="file" id="appLogo" accept="image/*" required>
                <button onclick="uploadApp()">Publish App</button>
            </div>
            <p id="uploadStatus" style="font-size: 14px; margin-top: 10px; text-align: center; font-weight: bold;"></p>
        </div>
    </main>

    <nav>
        <button id="btn-home" class="active" onclick="switchTab('home')">🏠 Home</button>
        <button id="btn-search" onclick="switchTab('search')">🔍 Search</button>
        <button id="btn-profile" onclick="switchTab('profile')">👤 Profile</button>
    </nav>
</div>

<script>
    // ট্যাব পরিবর্তন করার ফাংশন
    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        document.getElementById('btn-' + tabId).classList.add('active');
    }

    // অ্যাপ আপলোড করার ফাংশন (Base64 Method)
    function uploadApp() {
        const name = document.getElementById('appName').value;
        const fileInput = document.getElementById('appLogo');
        const status = document.getElementById('uploadStatus');

        if (!name || fileInput.files.length === 0) {
            status.style.color = 'red';
            status.innerText = "Please enter app name and select a logo!";
            return;
        }

        status.style.color = '#007bff';
        status.innerText = "Converting to Base64 and Uploading...";

        const file = fileInput.files[0];
        const reader = new FileReader();

        // ছবি Base64 এ কনভার্ট হয়ে গেলে এই অংশ কাজ করবে
        reader.onloadend = function() {
            const base64Image = reader.result; // এটাই সেই Base64 স্ট্রিং
            
            // রেন্ডম ডাউনলোড এবং রেটিং তৈরি করা (ভিডিওর বাস্তবরূপের জন্য)
            const downloads = Math.floor(Math.random() * 100) + 1;
            const rating = (Math.random() * (5.0 - 4.0) + 4.0).toFixed(1);

            // নতুন অ্যাপ কার্ডের HTML তৈরি
            const newAppHTML = `
                <div class="app-card">
                    <img src="${base64Image}" class="app-logo" alt="${name}">
                    <div class="app-info">
                        <h3 class="app-title">${name}</h3>
                        <div class="app-stats">⭐ ${rating} | 📥 ${downloads}K+ Downloads</div>
                        <div class="app-links"><a href="#" target="_blank">LinkedIn Profile</a></div>
                    </div>
                    <button class="btn-download" onclick="alert('Downloading ${name}...')">GET</button>
                </div>
            `;
            
            // হোম পেজের লিস্টে সবার উপরে নতুন অ্যাপটি যোগ করা
            const appList = document.getElementById('appList');
            appList.insertAdjacentHTML('afterbegin', newAppHTML);
            
            status.style.color = 'green';
            status.innerText = "Success! App published via Base64.";
            
            // ফর্ম ক্লিয়ার করা
            document.getElementById('appName').value = '';
            fileInput.value = '';
            
            // ১.৫ সেকেন্ড পর অটোমেটিক হোম পেজে নিয়ে যাওয়া
            setTimeout(() => {
                switchTab('home');
                status.innerText = '';
            }, 1500);
        };
        
        // ফাইলকে Base64 এ পড়ার নির্দেশ
        reader.readAsDataURL(file);
    }
</script>

</body>
</html>
